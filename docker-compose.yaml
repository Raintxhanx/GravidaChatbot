version: "3.9"

services:
  app:
    build: .
    container_name: pregnancy_app
    ports:
      - "8021:5000"
    networks:
      - pg_network_link
      - default
    volumes:
      # Petakan folder model di dalam container ke volume bernama 'model_data'
      - model_data:/app/model_data 

volumes:
  model_data:

networks:
  pg_network_link:
    external: true
    name: postgres-docker_pg_network